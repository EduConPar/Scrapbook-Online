<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>D&D Field Mapper</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; font-size: 12px; background: #1a1a1a; color: #eee; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

#toolbar {
    background: #2a2a2a; border-bottom: 1px solid #444;
    padding: 6px 10px; display: flex; gap: 8px; align-items: center;
    flex-wrap: wrap; flex-shrink: 0;
}
#toolbar select, #toolbar input {
    background: #333; color: #eee; border: 1px solid #555;
    padding: 3px 6px; font-family: monospace; font-size: 12px;
}
#toolbar button {
    background: #444; color: #eee; border: 1px solid #666;
    padding: 3px 10px; cursor: pointer; font-family: monospace; font-size: 12px;
}
#toolbar button:hover { background: #555; }
#toolbar button.active { background: #0066cc; border-color: #0088ff; }
#field-id { width: 160px; }

#main { display: flex; flex: 1; overflow: hidden; }

#canvas-area {
    flex: 1; overflow: auto; background: #444;
    padding: 16px;
}

/* El img-container es el que captura los eventos */
#img-container {
    position: relative; display: inline-block;
    line-height: 0; cursor: crosshair;
    user-select: none;
}
#bg-img { display: block; max-width: 860px; pointer-events: none; }

.field-rect {
    position: absolute;
    border: 2px solid rgba(255,80,80,0.9);
    background: rgba(255,80,80,0.15);
    cursor: pointer;
}
.field-rect:hover { background: rgba(255,80,80,0.35); }
.field-rect.selected { border-color: #ffff00; background: rgba(255,255,0,0.2); }
.field-rect.type-textarea { border-color: rgba(80,255,80,0.9); background: rgba(80,255,80,0.1); }
.field-rect.type-checkbox { border-color: rgba(80,200,255,0.9); background: rgba(80,200,255,0.15); }
.field-label {
    position: absolute; top: -15px; left: 0;
    background: rgba(180,0,0,0.9); color: #fff;
    font-size: 9px; padding: 1px 3px; white-space: nowrap;
    pointer-events: none;
}
.field-rect.type-textarea .field-label { background: rgba(0,140,0,0.9); }
.field-rect.type-checkbox  .field-label { background: rgba(0,100,180,0.9); }

#drag-rect {
    position: absolute; border: 2px dashed #00ff00;
    background: rgba(0,255,0,0.08); pointer-events: none; display: none;
}

/* SIDEBAR */
#sidebar {
    width: 320px; background: #222; border-left: 1px solid #444;
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
}
#sidebar h3 { padding: 7px 10px; background: #2a2a2a; border-bottom: 1px solid #444; font-size: 11px; color: #bbb; }
#field-form { padding: 8px 10px; border-bottom: 1px solid #333; }
#field-form label { display: block; color: #999; font-size: 10px; margin-top: 5px; margin-bottom: 2px; }
#field-form input[type="text"],
#field-form input[type="number"],
#field-form select {
    width: 100%; background: #333; color: #eee;
    border: 1px solid #555; padding: 3px 5px;
    font-family: monospace; font-size: 11px;
}
.row2 { display: flex; gap: 4px; }
.row2 input { width: 50% !important; }
#coords-display { background: #111; border: 1px solid #333; padding: 4px 6px; font-size: 10px; color: #0f0; margin-top: 6px; min-height: 18px; }
#add-btn { margin-top: 6px; width: 100%; background: #005500; color: #fff; border: 1px solid #007700; padding: 5px; cursor: pointer; font-family: monospace; font-size: 12px; }
#add-btn:hover { background: #007700; }
#del-btn { margin-top: 3px; width: 100%; background: #550000; color: #fff; border: 1px solid #880000; padding: 4px; cursor: pointer; font-family: monospace; font-size: 11px; }
#del-btn:hover { background: #880000; }
#output-area { flex: 1; overflow: auto; padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }
#code-out {
    background: #111; border: 1px solid #333; padding: 6px;
    font-size: 10px; color: #0ff; white-space: pre;
    overflow: auto; flex: 1; min-height: 80px; cursor: text;
}
.out-btn {
    background: #333; color: #eee; border: 1px solid #555;
    padding: 4px 8px; cursor: pointer; font-family: monospace; font-size: 11px; width: 100%;
}
.out-btn:hover { background: #444; }
.out-btn.blue { background: #003366; border-color: #0055aa; }
.out-btn.blue:hover { background: #004488; }
#status-bar { padding: 4px 10px; background: #111; border-top: 1px solid #333; font-size: 10px; color: #888; flex-shrink: 0; }

#cursor-pos {
    position: fixed; bottom: 6px; left: 6px;
    background: rgba(0,0,0,.85); color: #0f0;
    font-size: 10px; padding: 2px 6px; border-radius: 3px;
    pointer-events: none; z-index: 999;
}
</style>
</head>
<body>

<div id="toolbar">
    <label>Imagen:</label>
    <select id="img-select" onchange="loadImg()">
        <option value="ofic_0">ofic_0 — Ficha principal oficial</option>
        <option value="ofic_1">ofic_1 — Trasfondo oficial</option>
        <option value="ofic_2">ofic_2 — Conjuros oficial</option>
        <option value="art_0">art_0 — Ficha principal artística</option>
        <option value="art_1">art_1 — Inventario artístico</option>
        <option value="art_2">art_2 — Conjuros artístico</option>
    </select>
    <button id="btn-drag" class="active" onclick="setMode('drag')">✏ Dibujar</button>
    <button id="btn-sel"  onclick="setMode('select')">👆 Seleccionar</button>
    <label>Tipo:</label>
    <select id="field-type">
        <option value="text">text</option>
        <option value="number">number</option>
        <option value="textarea">textarea</option>
        <option value="checkbox">checkbox</option>
    </select>
    <label>ID:</label>
    <input id="field-id" type="text" placeholder="o-nombre">
    <label>fs:</label>
    <input type="number" id="field-fs" value="12" style="width:42px">
    <button onclick="clearAll()">🗑 Limpiar</button>
    <button onclick="loadSaved()">📂 Cargar</button>
</div>

<div id="main">
    <div id="canvas-area">
        <div id="img-container">
            <img id="bg-img" src="" alt="">
            <div id="drag-rect"></div>
        </div>
    </div>

    <div id="sidebar">
        <h3>➕ Campo</h3>
        <div id="field-form">
            <label>ID</label>
            <input id="sel-id" type="text" placeholder="o-nombre">
            <label>Tipo</label>
            <select id="sel-type">
                <option value="text">text</option>
                <option value="number">number</option>
                <option value="textarea">textarea</option>
                <option value="checkbox">checkbox</option>
            </select>
            <label>Font size</label>
            <input id="sel-fs" type="number" value="12">
            <label>l % &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; t %</label>
            <div class="row2">
                <input id="sel-l" type="number" step="0.1" placeholder="l">
                <input id="sel-t" type="number" step="0.1" placeholder="t">
            </div>
            <label>w % &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; h %</label>
            <div class="row2">
                <input id="sel-w" type="number" step="0.1" placeholder="w">
                <input id="sel-h" type="number" step="0.1" placeholder="h">
            </div>
            <div id="coords-display">—</div>
            <button id="add-btn" onclick="addOrUpdate()">✔ Añadir / Actualizar</button>
            <button id="del-btn" onclick="deleteSelected()">✕ Eliminar seleccionado</button>
        </div>
        <div id="output-area">
            <h3>📋 Código generado</h3>
            <div id="code-out">// dibuja campos para generar código</div>
            <button class="out-btn blue" onclick="copyCode()">📋 Copiar código</button>
            <button class="out-btn" onclick="saveFields()">💾 Guardar en localStorage</button>
            <button class="out-btn" onclick="exportJSON()">⬇ Exportar JSON</button>
        </div>
        <div id="status-bar">Listo.</div>
    </div>
</div>

<div id="cursor-pos">x:— y:—</div>

<script>
/* ── Carga imágenes ── */
var script = document.createElement('script');
script.src = 'dnd_imgs.js';
script.onload  = function(){ loadImg(); setStatus('Imágenes cargadas ✔'); };
script.onerror = function(){ setStatus('ERROR: no se cargó dnd_imgs.js'); };
document.head.appendChild(script);

/* ── Estado ── */
var fields       = {};   // { imgKey: [{id,l,t,w,h,type,fs}] }
var selectedId   = null;
var mode         = 'drag';
var currentKey   = 'ofic_0';
var dragging     = false;
var dragStart    = {x:0, y:0};

/* ── Imagen ── */
function loadImg(){
    currentKey = document.getElementById('img-select').value;
    var img = document.getElementById('bg-img');
    if(typeof DND_IMGS !== 'undefined' && DND_IMGS[currentKey]){
        img.src = DND_IMGS[currentKey];
        img.onload = function(){ renderFields(); };
    }
    selectedId = null;
    generateCode();
}

/* ── Modo ── */
function setMode(m){
    mode = m;
    document.getElementById('btn-drag').classList.toggle('active', m==='drag');
    document.getElementById('btn-sel').classList.toggle('active',  m==='select');
    document.getElementById('img-container').style.cursor = m==='drag' ? 'crosshair' : 'default';
}

/* ── Coordenadas relativas a la imagen ── */
function getPct(e){
    var img  = document.getElementById('bg-img');
    var rect = img.getBoundingClientRect();
    // Usar offsetX/offsetY si el evento viene del img-container directamente
    var x = (e.clientX - rect.left) / rect.width  * 100;
    var y = (e.clientY - rect.top)  / rect.height * 100;
    return { x: Math.max(0, Math.min(100, x)),
             y: Math.max(0, Math.min(100, y)) };
}

/* ── Eventos del canvas (sobre img-container) ── */
var ic = document.getElementById('img-container');

ic.addEventListener('mousemove', function(e){
    var p = getPct(e);
    document.getElementById('cursor-pos').textContent = 'x:'+p.x.toFixed(1)+'%  y:'+p.y.toFixed(1)+'%';
    if(!dragging || mode!=='drag') return;
    var img = document.getElementById('bg-img');
    var W = img.offsetWidth, H = img.offsetHeight;
    var dr = document.getElementById('drag-rect');
    var l  = Math.min(p.x, dragStart.x), t = Math.min(p.y, dragStart.y);
    var w  = Math.abs(p.x - dragStart.x), h = Math.abs(p.y - dragStart.y);
    dr.style.left   = l/100*W + 'px';
    dr.style.top    = t/100*H + 'px';
    dr.style.width  = w/100*W + 'px';
    dr.style.height = h/100*H + 'px';
});

ic.addEventListener('mousedown', function(e){
    if(e.target.classList.contains('field-rect') ||
       e.target.classList.contains('field-label')) return;
    if(mode !== 'drag') return;
    e.preventDefault();
    dragging  = true;
    dragStart = getPct(e);
    var dr = document.getElementById('drag-rect');
    dr.style.cssText = 'display:block;left:0;top:0;width:0;height:0;';
});

ic.addEventListener('mouseup', function(e){
    if(!dragging || mode!=='drag') return;
    dragging = false;
    document.getElementById('drag-rect').style.display = 'none';
    var end = getPct(e);
    var l = Math.min(dragStart.x, end.x);
    var t = Math.min(dragStart.y, end.y);
    var w = Math.abs(end.x - dragStart.x);
    var h = Math.abs(end.y - dragStart.y);
    if(w < 0.2 && h < 0.2) return;

    // Rellenar sidebar
    document.getElementById('sel-l').value = l.toFixed(1);
    document.getElementById('sel-t').value = t.toFixed(1);
    document.getElementById('sel-w').value = w.toFixed(1);
    document.getElementById('sel-h').value = h.toFixed(1);
    document.getElementById('sel-id').value   = document.getElementById('field-id').value;
    document.getElementById('sel-type').value = document.getElementById('field-type').value;
    document.getElementById('sel-fs').value   = document.getElementById('field-fs').value;
    document.getElementById('coords-display').textContent =
        'l:'+l.toFixed(1)+'%  t:'+t.toFixed(1)+'%  w:'+w.toFixed(1)+'%  h:'+h.toFixed(1)+'%';
    selectedId = null;
    setStatus('Campo dibujado → pon ID y pulsa Añadir');
});

/* ── Añadir / actualizar ── */
function addOrUpdate(){
    var id   = document.getElementById('sel-id').value.trim();
    var type = document.getElementById('sel-type').value;
    var fs   = parseFloat(document.getElementById('sel-fs').value) || 12;
    var l    = parseFloat(document.getElementById('sel-l').value);
    var t    = parseFloat(document.getElementById('sel-t').value);
    var w    = parseFloat(document.getElementById('sel-w').value);
    var h    = parseFloat(document.getElementById('sel-h').value);
    if(!id){ alert('Pon un ID'); return; }
    if(isNaN(l)||isNaN(t)||isNaN(w)){ alert('Dibuja el campo primero'); return; }
    if(!fields[currentKey]) fields[currentKey] = [];
    var ex = fields[currentKey].find(function(f){ return f.id===id; });
    if(ex){ Object.assign(ex,{l,t,w,h:isNaN(h)?undefined:h,type,fs}); }
    else   { fields[currentKey].push({id,l,t,w,h:isNaN(h)?undefined:h,type,fs}); }
    selectedId = id;
    renderFields();
    generateCode();
    // Auto-increment ID numérico
    var next = id.replace(/(\d+)$/, function(m){ return String(parseInt(m)+1); });
    if(next !== id) document.getElementById('field-id').value = next;
    setStatus('Campo "'+id+'" añadido ✔');
}

function deleteSelected(){
    if(!selectedId || !fields[currentKey]) return;
    fields[currentKey] = fields[currentKey].filter(function(f){ return f.id!==selectedId; });
    selectedId = null;
    renderFields(); generateCode();
    setStatus('Campo eliminado');
}

/* ── Render campos ── */
function renderFields(){
    document.querySelectorAll('.field-rect').forEach(function(el){ el.remove(); });
    var arr = fields[currentKey] || [];
    var img = document.getElementById('bg-img');
    var W = img.offsetWidth, H = img.offsetHeight;
    if(!W){ setTimeout(renderFields, 80); return; }
    var ic = document.getElementById('img-container');

    arr.forEach(function(fd){
        var div = document.createElement('div');
        div.className = 'field-rect' +
            (fd.id===selectedId ? ' selected' : '') +
            (fd.type==='textarea' ? ' type-textarea' : '') +
            (fd.type==='checkbox'  ? ' type-checkbox'  : '');
        div.style.left   = (fd.l/100*W)+'px';
        div.style.top    = (fd.t/100*H)+'px';
        div.style.width  = (fd.w/100*W)+'px';
        div.style.height = ((fd.h||2)/100*H)+'px';

        var lbl = document.createElement('div');
        lbl.className = 'field-label';
        lbl.textContent = fd.id+' ('+fd.type+')';
        div.appendChild(lbl);

        div.addEventListener('click', function(e){
            e.stopPropagation();
            selectedId = fd.id;
            document.getElementById('sel-id').value   = fd.id;
            document.getElementById('sel-type').value = fd.type;
            document.getElementById('sel-fs').value   = fd.fs||12;
            document.getElementById('sel-l').value    = fd.l.toFixed(1);
            document.getElementById('sel-t').value    = fd.t.toFixed(1);
            document.getElementById('sel-w').value    = fd.w.toFixed(1);
            document.getElementById('sel-h').value    = (fd.h!==undefined ? fd.h.toFixed(1) : '');
            document.getElementById('coords-display').textContent =
                'l:'+fd.l.toFixed(1)+'%  t:'+fd.t.toFixed(1)+'%  w:'+fd.w.toFixed(1)+'%  h:'+(fd.h!==undefined?fd.h.toFixed(1):'?')+'%';
            renderFields();
        });
        ic.appendChild(div);
    });
}

/* ── Generar código ── */
function generateCode(){
    var arr = fields[currentKey] || [];
    if(!arr.length){ document.getElementById('code-out').textContent='// Sin campos aún'; return; }
    var lines = arr.map(function(fd){
        var h = (fd.h !== undefined && !isNaN(fd.h)) ? fd.h : 2;
        if(fd.type==='textarea')
            return "          ft('"+fd.id+"', "+fd.l.toFixed(1)+", "+fd.t.toFixed(1)+", "+fd.w.toFixed(1)+", "+h.toFixed(1)+", "+fd.fs+"),";
        if(fd.type==='checkbox')
            return "          fc('"+fd.id+"', "+fd.l.toFixed(1)+", "+fd.t.toFixed(1)+"),";
        if(fd.type==='number')
            return "          fn('"+fd.id+"', "+fd.l.toFixed(1)+", "+fd.t.toFixed(1)+", "+fd.w.toFixed(1)+", "+fd.fs+"),";
        return      "          f('"+fd.id+"',  "+fd.l.toFixed(1)+", "+fd.t.toFixed(1)+", "+fd.w.toFixed(1)+", "+fd.fs+"),";
    });
    document.getElementById('code-out').textContent = '// '+currentKey+'\n'+lines.join('\n');
}

function copyCode(){
    navigator.clipboard.writeText(document.getElementById('code-out').textContent)
        .then(function(){ setStatus('¡Código copiado al portapapeles!'); });
}

/* ── Persistencia ── */
function saveFields(){
    localStorage.setItem('dnd_mapper', JSON.stringify(fields));
    setStatus('Guardado en localStorage ✔');
}
function loadSaved(){
    var s = localStorage.getItem('dnd_mapper');
    if(!s){ setStatus('No hay datos guardados'); return; }
    fields = JSON.parse(s);
    renderFields(); generateCode();
    setStatus('Cargado ✔');
}
function exportJSON(){
    var a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(fields,null,2)],{type:'application/json'}));
    a.download = 'dnd_fields.json'; a.click();
}
function clearAll(){
    if(!confirm('¿Borrar todos los campos de '+currentKey+'?')) return;
    fields[currentKey] = [];
    selectedId = null;
    renderFields(); generateCode();
}

window.addEventListener('resize', renderFields);
function setStatus(msg){ document.getElementById('status-bar').textContent = msg; }
</script>
</body>
</html>
